<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    display:flex;
    height:100vh;
    color:white;

    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
                url('IMG_0248.jpeg') no-repeat center/cover;
}

.sidebar{
    width:250px;
    background: rgba(30,58,138,0.9);
    backdrop-filter: blur(10px);
    padding:20px;
}

.sidebar h2{
    color:#ffd166;
    margin-bottom:20px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    margin:15px 0;
    padding:10px;
    border-radius:8px;
    transition:0.3s;
}

.sidebar a:hover{
    background:#ffd166;
    color:black;
}

.main{
    flex:1;
    padding:30px;
}

.header{
    margin-bottom:20px;
}

.header h1{
    color:#ffd166;
}

.cards{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.card{
    flex:1;
    min-width:220px;
    padding:20px;
    border-radius:15px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);

    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    transition:0.3s;
}

.card:hover{
    transform: translateY(-5px) scale(1.02);
}

.table{
    margin-top:30px;
    background: rgba(255,255,255,0.08);
    border-radius:15px;
    padding:20px;
    backdrop-filter: blur(10px);
}

table{
    width:100%;
    border-collapse: collapse;
}

th, td{
    padding:10px;
    text-align:left;
}

th{
    color:#ffd166;
}

tr{
    border-bottom:1px solid rgba(255,255,255,0.2);
}

/* FORM */
.form{
    margin-top:20px;
}

.form input{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
}

.form button{
    padding:10px 15px;
    background:#ffd166;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* FEES BUTTON */
.fees-btn{
    background:#ffd166;
    color:black;
    padding:6px 12px;
    border-radius:6px;
    text-decoration:none;
    font-size:14px;
}

.fees-btn:hover{
    background:white;
}

/* LOGOUT */
.logout{
    margin-top:20px;
    display:block;
    text-align:center;
    background:#ffd166;
    color:black;
    padding:10px;
    border-radius:10px;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>SEH Admin</h2>

    <a href="index.html">🏠 Home</a>
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="students.html">👨‍🎓 Students</a>
    <a href="#">📋 Applications</a>
    <a href="#">📚 Courses</a>

    <a href="admin.html" class="logout">Logout</a>
</div>

<div class="main">

    <div class="header">
        <h1>Welcome, Admin 👋</h1>
        <p>Manage your tuition system easily</p>
    </div>

    <!-- CARDS -->
    <div class="cards">
        <div class="card">
            <h3>Total Students</h3>
            <p id="totalStudents">0</p>
        </div>

        <div class="card">
            <h3>New Admissions</h3>
            <p id="newAdmissions">0</p>
        </div>

        <div class="card">
            <h3>Courses Running</h3>
            <p>6</p>
        </div>
    </div>

    <!-- FORM -->
    <div class="form">
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="class" placeholder="Class">
        <input type="text" id="course" placeholder="Course">
        <input type="number" id="fees" placeholder="Fees">
        <!-- ✅ ONLY ADDITION -->
        <input type="password" id="password" placeholder="Password">
        <button onclick="addStudent()">Add Student</button>
    </div>

    <!-- TABLE -->
    <div class="table">
        <h2>Students Data</h2>

        <table id="table">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Class</th>
                <th>Course</th>
                <th>Fees</th>
                <th>Action</th>
            </tr>
        </table>
    </div>

</div>

<script>
let students = JSON.parse(localStorage.getItem("students")) || [];

function generateID(){
    return "SEH" + Math.floor(1000 + Math.random() * 9000);
}

function render(){
    let table = document.getElementById("table");

    table.innerHTML = `
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Class</th>
        <th>Course</th>
        <th>Fees</th>
        <th>Action</th>
    </tr>
    `;

    students.forEach((s)=>{
        table.innerHTML += `
        <tr>
            <td>${s.id}</td>
            <td>${s.name}</td>
            <td>${s.class}</td>
            <td>${s.course}</td>
            <td>₹${s.fees}</td>
            <td>
                <a href="fees.html?id=${s.id}" class="fees-btn">Fees</a>
            </td>
        </tr>`;
    });

    document.getElementById("totalStudents").innerText = students.length;
    document.getElementById("newAdmissions").innerText = students.length;
}

function addStudent(){
    let name = document.getElementById("name").value;
    let cls = document.getElementById("class").value;
    let course = document.getElementById("course").value;
    let fees = document.getElementById("fees").value;
    let password = document.getElementById("password").value;

    if(name && cls && course && fees && password){
        let student = {
            id: generateID(),
            name: name,
            class: cls,
            course: course,
            fees: fees,
            password: password   // ✅ ADDED
        };

        students.push(student);
        localStorage.setItem("students", JSON.stringify(students));
        render();
    }
}

render();
</script>

</body>
</html>
