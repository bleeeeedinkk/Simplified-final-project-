<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<style>
body{
    font-family:sans-serif;
    margin:0;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#1e293b;
    padding:30px;
    border-radius:10px;
    width:300px;
}

.status-paid{color:#00ff99;}
.status-pending{color:#ff4d4d;}

.logout{
    margin-top:15px;
    display:block;
    background:#ffd166;
    color:black;
    padding:10px;
    text-align:center;
    border-radius:6px;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="card" id="data"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let docId = localStorage.getItem("studentDocId");

if(!docId){
    alert("Login first");
    window.location.href = "student.html";
}

onSnapshot(doc(db,"students",docId),(snap)=>{
    let s = snap.data();

    let status = s.paid == s.fees ? "Paid" : "Pending";
    let cls = s.paid == s.fees ? "status-paid" : "status-pending";

    document.getElementById("data").innerHTML = `
        <h2>${s.name}</h2>
        <p><b>ID:</b> ${s.studentID}</p>
        <p><b>Class:</b> ${s.class}</p>
        <p><b>Course:</b> ${s.course}</p>

        <hr>

        <p><b>Total Fees:</b> ₹${s.fees}</p>
        <p><b>Paid:</b> ₹${s.paid}</p>

        <p class="${cls}">
            <b>Status:</b> ${status}
        </p>

        <a href="student.html" class="logout">Logout</a>
    `;
});
</script>

</body>
</html>
