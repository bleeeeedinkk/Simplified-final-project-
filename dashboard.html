<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    display:flex;
    height:100vh;
    color:white;

    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
                url('IMG_0248.jpeg') no-repeat center/cover;
}

/* SIDEBAR */
.sidebar{
    width:250px;
    background: rgba(30,58,138,0.9);
    backdrop-filter: blur(10px);
    padding:20px;
}

.sidebar h2{
    color:#ffd166;
    margin-bottom:20px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    margin:15px 0;
    padding:10px;
    border-radius:8px;
    transition:0.3s;
}

.sidebar a:hover{
    background:#ffd166;
    color:black;
}

/* MAIN */
.main{
    flex:1;
    padding:30px;
}

/* HEADER */
.header{
    margin-bottom:20px;
}

.header h1{
    color:#ffd166;
}

/* CARDS */
.cards{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.card{
    flex:1;
    min-width:220px;
    padding:20px;
    border-radius:15px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);

    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    transition:0.3s;
}

.card:hover{
    transform: translateY(-5px) scale(1.02);
}

.card h3{
    margin-bottom:10px;
}

/* TABLE */
.table{
    margin-top:30px;
    background: rgba(255,255,255,0.08);
    border-radius:15px;
    padding:20px;
    backdrop-filter: blur(10px);
}

table{
    width:100%;
    border-collapse: collapse;
}

th, td{
    padding:10px;
    text-align:left;
}

th{
    color:#ffd166;
}

tr{
    border-bottom:1px solid rgba(255,255,255,0.2);
}

/* LOGOUT BUTTON */
.logout{
    margin-top:20px;
    display:block;
    text-align:center;
    background:#ffd166;
    color:black;
    padding:10px;
    border-radius:10px;
    text-decoration:none;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>SEH Admin</h2>

    <a href="#">Dashboard</a>
    <a href="#">Students</a>
    <a href="#">Applications</a>
    <a href="#">Courses</a>

    <a href="admin.html" class="logout">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

    <div class="header">
        <h1>Welcome, Admin 👋</h1>
        <p>Manage your tuition system easily</p>
    </div>

    <!-- CARDS -->
    <div class="cards">
        <div class="card">
            <h3>Total Students</h3>
            <p>120</p>
        </div>

        <div class="card">
            <h3>New Admissions</h3>
            <p>25</p>
        </div>

        <div class="card">
            <h3>Courses Running</h3>
            <p>6</p>
        </div>
    </div>

    <!-- TABLE -->
    <div class="table">
        <h2>Recent Applications</h2>

        <table>
            <tr>
                <th>Name</th>
                <th>Class</th>
                <th>Course</th>
            </tr>

            <tr>
                <td>Rahul</td>
                <td>10th</td>
                <td>Vedic Maths</td>
            </tr>

            <tr>
                <td>Priya</td>
                <td>12th</td>
                <td>Commerce</td>
            </tr>
        </table>
    </div>

</div>

</body>
</html>
