<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
display:flex;height:100vh;color:white;
background:linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
url('IMG_0248.jpeg') no-repeat center/cover;
}

.sidebar{width:250px;background:rgba(30,58,138,0.9);padding:20px;}
.sidebar h2{color:#ffd166;margin-bottom:20px;}
.sidebar a{display:block;color:white;text-decoration:none;margin:15px 0;padding:10px;border-radius:8px;}
.sidebar a:hover{background:#ffd166;color:black;}

.main{flex:1;padding:30px;}

.card{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:15px;
margin:15px 0;
}

input{
padding:10px;margin:5px;border:none;border-radius:8px;
}

button{
padding:10px;border:none;border-radius:8px;
background:#ffd166;cursor:pointer;
}

table{width:100%;margin-top:20px;}
th,td{padding:10px;text-align:left;}
</style>
</head>

<body>

<div class="sidebar">
<h2>SEH Admin</h2>
<a href="index.html">🏠 Home</a>
</div>

<div class="main">

<h1>Admin Dashboard</h1>

<!-- ADD STUDENT -->
<div class="card">
<h3>Add Student</h3>
<input id="name" placeholder="Name">
<input id="class" placeholder="Class">
<input id="course" placeholder="Course">
<input id="fees" placeholder="Fees">
<input id="password" placeholder="Password">
<button onclick="addStudent()">Add</button>
</div>

<!-- BATCH -->
<div class="card">
<h3>Create Batch</h3>
<input id="batchName" placeholder="Batch Name">
<button onclick="addBatch()">Create</button>

<h3>Assign Batch</h3>
<input id="studentID" placeholder="Student ID">
<input id="assignBatchInput" placeholder="Batch">
<button onclick="assignBatch()">Assign</button>
</div>

<!-- VIDEO -->
<div class="card">
<h3>Add Video to Batch</h3>
<input id="videoBatch" placeholder="Batch">
<input id="videoLink" placeholder="YouTube Embed Link">
<button onclick="addVideo()">Add Video</button>
</div>

<!-- TEST -->
<div class="card">
<h3>Add Test Score</h3>
<input id="testID" placeholder="Student ID">
<input id="score" placeholder="Score">
<button onclick="addScore()">Add Score</button>
</div>

<!-- TABLE -->
<table id="table"></table>

</div>

<script>
let students = JSON.parse(localStorage.getItem("students")) || [];
let batches = JSON.parse(localStorage.getItem("batches")) || [];

function generateID(){
 return "SEH"+Math.floor(1000+Math.random()*9000);
}

function addStudent(){
 let name = document.getElementById("name").value;
 let cls = document.getElementById("class").value;
 let course = document.getElementById("course").value;
 let fees = document.getElementById("fees").value;
 let password = document.getElementById("password").value;

 if(name && cls && course && fees && password){
  let s={
   id:generateID(),
   name,
   class:cls,
   course,
   fees:Number(fees),
   password,
   batch:"",
   score:0
  };

  students.push(s);
  localStorage.setItem("students",JSON.stringify(students));

  alert("ID: "+s.id+" | PASS: "+password);

  document.querySelectorAll("input").forEach(i=>i.value="");
  render();
 } else {
  alert("Fill all fields");
 }
}

function addBatch(){
 let name = document.getElementById("batchName").value;

 if(name){
  batches.push(name);
  localStorage.setItem("batches",JSON.stringify(batches));
  alert("Batch Created");
  document.getElementById("batchName").value="";
 } else {
  alert("Enter batch name");
 }
}

function assignBatch(){
 let id = document.getElementById("studentID").value;
 let batch = document.getElementById("assignBatchInput").value;

 let found=false;

 students.forEach(s=>{
  if(s.id===id){
   s.batch=batch;
   found=true;
  }
 });

 if(found){
  localStorage.setItem("students",JSON.stringify(students));
  alert("Batch Assigned");
  render();
 } else {
  alert("Student not found");
 }
}

function addVideo(){
 let batch = document.getElementById("videoBatch").value;
 let link = document.getElementById("videoLink").value;

 if(batch && link){
  let vids = JSON.parse(localStorage.getItem("videos_"+batch)) || [];
  vids.push(link);
  localStorage.setItem("videos_"+batch,JSON.stringify(vids));

  alert("Video Added");
 } else {
  alert("Fill fields");
 }
}

function addScore(){
 let id = document.getElementById("testID").value;
 let sc = document.getElementById("score").value;

 let found=false;

 students.forEach(s=>{
  if(s.id===id){
   s.score=Number(sc);
   found=true;
  }
 });

 if(found){
  localStorage.setItem("students",JSON.stringify(students));
  alert("Score Updated");
  render();
 } else {
  alert("Student not found");
 }
}

function render(){
 let t=document.getElementById("table");

 t.innerHTML = `
 <tr>
 <th>ID</th>
 <th>Name</th>
 <th>Class</th>
 <th>Course</th>
 <th>Batch</th>
 <th>Score</th>
 </tr>`;

 students.forEach(s=>{
  t.innerHTML+=`
  <tr>
  <td>${s.id}</td>
  <td>${s.name}</td>
  <td>${s.class}</td>
  <td>${s.course}</td>
  <td>${s.batch||"None"}</td>
  <td>${s.score}</td>
  </tr>`;
 });
}

render();
</script>

</body>
</html>
