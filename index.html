<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simplified Education Hub - Best Coaching Institute</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy: #1e3a8a;
            --navy-light: #3b82f6;
            --gold: #f59e0b;
            --white: #ffffff;
            --gray: #f8fafc;
            --gray-dark: #64748b;

            --shadow: 0 10px 30px rgba(0,0,0,0.1);
            --shadow-hover: 0 20px 40px rgba(0,0,0,0.15);
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: #333;
            overflow-x: hidden;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(30, 58, 138, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 1rem 0;
            transition: all 0.3s ease;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--gold);
            text-decoration: none;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-link:hover {
            color: var(--gold);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background: var(--gold);
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* Hero */
        .hero {
            height: 100vh;
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        .hero-content {
            max-width: 800px;
        }

        .cta-buttons {
            margin-top: 20px;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            margin: 5px;
            display: inline-block;
        }

        .btn-primary {
            background: var(--gold);
            color: var(--navy);
        }

        .btn-secondary {
            border: 2px solid white;
            color: white;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="nav-container">
        <!-- ✅ FIXED HOME LINK ONLY -->
        <a href="home.html" class="logo">SEH</a>

        <ul class="nav-menu">
            <!-- ✅ FIXED -->
            <li><a href="home.html" class="nav-link">Home</a></li>

            <li><a href="#courses" class="nav-link">Courses</a></li>
            <li><a href="#about" class="nav-link">About</a></li>

            <li><a href="apply.html" class="nav-link">Apply Now</a></li>
        </ul>
    </div>
</nav>

<!-- Hero -->
<section id="home" class="hero">
    <div class="hero-content">
        <h1>Admissions Open for 2026–2027 Batch</h1>
        <p>Secure Your Spot Today!</p>

        <div class="cta-buttons">

            <a href="apply.html" class="btn btn-primary">Apply Now</a>

            <a href="#contact" class="btn btn-secondary">Contact Us</a>
        </div>
    </div>
</section>

</body>
</html>
