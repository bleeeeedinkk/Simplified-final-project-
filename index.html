<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simplified Education Hub - Best Coaching Institute</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy: #1e3a8a;
            --navy-light: #3b82f6;
            --gold: #f59e0b;
        }

        body {
            font-family: 'Poppins', sans-serif;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(30, 58, 138, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 1rem 0;
        }

        .nav-container {
            max-width: 1200px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;

            flex-wrap: wrap; /* ✅ FIX */
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--gold);
            text-decoration: none;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 1.5rem; /* ✅ FIX */
            flex-wrap: wrap; /* ✅ FIX */
            align-items: center;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        .nav-link:hover {
            color: var(--gold);
        }

        /* Hero */
        .hero {
            height: 100vh;
            background: linear-gradient(135deg, var(--navy), var(--navy-light));
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        .hero-content {
            max-width: 800px;
        }

        .cta-buttons {
            margin-top: 20px;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            margin: 5px;
            display: inline-block;
        }

        .btn-primary {
            background: var(--gold);
            color: var(--navy);
        }

        .btn-secondary {
            border: 2px solid white;
            color: white;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="nav-container">

        <a href="home.html" class="logo">SEH</a>

        <ul class="nav-menu">
            <li><a href="home.html" class="nav-link">Home</a></li>
            <li><a href="#courses" class="nav-link">Courses</a></li>
            <li><a href="#about" class="nav-link">About</a></li>

            <!-- Apply -->
            <li><a href="index.html" class="nav-link">Apply Now</a></li>

            <!-- ✅ NOW VISIBLE -->
            <li><a href="admin.html" class="nav-link">Admin</a></li>
        </ul>

    </div>
</nav>

<!-- Hero -->
<section id="home" class="hero">
    <div class="hero-content">
        <h1>Admissions Open for 2026–2027 Batch</h1>
        <p>Secure Your Spot Today!</p>

        <div class="cta-buttons">
            <a href="index.html" class="btn btn-primary">Apply Now</a>
            <a href="#contact" class="btn btn-secondary">Contact Us</a>
        </div>
    </div>
</section>

</body>
</html>
